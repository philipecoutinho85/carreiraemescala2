<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carreira em Escala | A Imersão Definitiva para Assessores</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            heading: ['Montserrat', 'sans-serif'],
          },
          colors: {
            purple: {
              400: '#C084FC',
              500: '#A855F7',
              600: '#9333EA',
              700: '#7E22CE',
            },
            dark: {
              800: '#1A1A1A',
              900: '#111111',
              950: '#080808',
            }
          },
          backgroundImage: {
            'hero-glow': 'radial-gradient(circle at center, rgba(168, 85, 247, 0.12) 0%, rgba(8, 8, 8, 1) 60%)',
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'slide-left': 'slide-left linear infinite',
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            },
            'slide-left': {
              '0%': { transform: 'translateX(100vw)' },
              '100%': { transform: 'translateX(-150vw)' },
            }
          }
        }
      }
    }
  </script>

  <style>
    .radio-label {
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .radio-input:checked + .radio-label {
      background: linear-gradient(135deg, #9333EA 0%, #A855F7 100%);
      border-color: #C084FC;
      color: #fff;
      box-shadow: 0 0 15px rgba(168, 85, 247, 0.3);
    }
    .carousel-item {
      transform-origin: center;
    }
    .carousel-item.active {
      opacity: 1;
      z-index: 10;
      transform: translateX(0) scale(1);
      pointer-events: auto;
    }
    .carousel-item.prev {
      opacity: 0.3;
      z-index: 0;
      transform: translateX(-120%) scale(0.75);
      pointer-events: none;
    }
    .carousel-item.next {
      opacity: 0.3;
      z-index: 0;
      transform: translateX(120%) scale(0.75);
      pointer-events: none;
    }
    .carousel-item.hidden-item {
      opacity: 0;
      z-index: -1;
      transform: translateX(0) scale(0);
      pointer-events: none;
    }
    @media (max-width: 768px) {
      .carousel-item.prev, .carousel-item.next {
        opacity: 0;
        visibility: hidden;
      }
    }
    .glass-input {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
    }
    .glass-input:focus {
      background: rgba(255, 255, 255, 0.05);
      border-color: #A855F7;
      box-shadow: 0 0 0 1px #A855F7;
    }
  </style>
</head>
<body class="bg-dark-950 text-white font-sans antialiased selection:bg-purple-500 selection:text-white overflow-x-hidden">
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
